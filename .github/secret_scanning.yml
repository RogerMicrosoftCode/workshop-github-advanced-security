# secret_scanning.yml — Configuración de exclusiones para Secret Scanning
#
# Este archivo le indica a GitHub Secret Scanning qué rutas ignorar.
# Las alertas encontradas en estas rutas se cierran automáticamente
# como "ignored by configuration".
#
# También aplica a Push Protection — los commits en estas rutas
# no serán bloqueados por secretos detectados.
#
# IMPORTANTE: Usar con precaución. Solo excluir rutas que contengan
# datos de prueba, mocks o secretos de ejemplo no reales.
# Nunca excluir rutas de código de producción.
#
# Referencia: https://docs.github.com/en/code-security/secret-scanning/
#   using-advanced-secret-scanning-and-push-protection-features/
#   excluding-folders-and-files-from-secret-scanning

paths-ignore:
  # ── Datos de prueba y fixtures ──────────────────────────────────────
  # Este proyecto es un workshop de GHAS con secretos INTENCIONALES.
  # Las rutas de servicios contienen secretos de demostración, no reales.
  # En un proyecto real, estas exclusiones NO deberían existir.
  #- "src/UsersApi/Services/AuthService.cs"
  #- "src/UsersApi/Services/CustomPatternDemoService.cs"
  #- "src/UsersApi/appsettings.json"

  # ── Documentación con ejemplos ──────────────────────────────────────
  # Los archivos de documentación pueden contener patrones de ejemplo
  # que no son secretos reales.
  - "docs/**"
